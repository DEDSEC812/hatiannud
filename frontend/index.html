<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ᕼᗩITIᗩᑎ ᑎᑌᗪ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
background:linear-gradient(-45deg,#000000,#0a1a40,#0a58ff,#8b0000);
background-size:400% 400%;
animation:bgmove 12s infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:999;
}

.loader{
width:60px;height:60px;border:6px solid #222;
border-top:6px solid #0a58ff;border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

#main{display:none;padding:30px 20px;max-width:420px;margin:auto;}

header{text-align:center;margin-bottom:25px;}

header img{
width:90px;border-radius:50%;
border:3px solid white;
box-shadow:0 0 15px #0a58ff;
margin-bottom:12px;
}

.section{margin-top:30px;}
.section h2{text-align:center;margin-bottom:15px;font-size:18px;}

.link-box{display:flex;flex-direction:column;gap:12px;}

.link-box a{
text-decoration:none;
padding:15px;
border-radius:12px;
text-align:center;
color:#000;
background:#fff;
font-weight:600;
transition:0.3s;
}

.link-box a:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#0a58ff,#ff2d2d);
color:#fff;
}

footer{text-align:center;margin-top:30px;font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<div id="loader">
<div class="loader"></div>
<p>Chargement...</p>
</div>

<div id="main">

<header>
<img src="/logo.png">
<h1>ᕼᗩITIᗩᑎ ᑎᑌᗪ</h1>
<p>Site officiel pour accéder à tous nos groupes</p>
</header>

<div class="section">
<h2>📢 Nos Canaux</h2>
<div class="link-box" id="canaux"></div>
</div>

<div class="section">
<h2>👥 Nos Groupes</h2>
<div class="link-box" id="groupes"></div>
</div>

<div class="section">
<h2>🌐 Réseaux Officiels</h2>
<div class="link-box" id="reseaux"></div>
</div>

<div class="section">
<h2>⭐ Contact PDG</h2>
<div class="link-box" id="contact"></div>
</div>

<footer>
© 2026 Haitian Network
</footer>

</div>

<script>
// 🔥 METE URL BACKEND OU ISIT (Render)
const API = "https://site-ou.onrender.com"; 

// loader
window.onload = function(){
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("main").style.display="block";
},1500);
};

// load links
async function loadLinks(){
try{
let res = await fetch(`${API}/links`);
let data = await res.json();

function render(section,id){
let container = document.getElementById(id);
container.innerHTML = "";

if(!data[section] || data[section].length === 0){
container.innerHTML = "<p style='text-align:center;opacity:0.6'>Aucun lien</p>";
return;
}

data[section].forEach(link=>{
container.innerHTML += `
<a href="${link.url}" target="_blank">${link.title}</a>
`;
});
}

render("canaux","canaux");
render("groupes","groupes");
render("reseaux","reseaux");
render("contact","contact");

}catch(e){
console.log(e);
alert("❌ Impossible de charger les données (API)");
}
}

loadLinks();
</script>

</body>
</html>
